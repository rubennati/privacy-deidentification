name: deid-pilot

services:
  backend:
    build:
      context: ./backend
      args:
        INSTALL_OCR: ${INSTALL_OCR:-false}
        INSTALL_PII: ${INSTALL_PII:-false}
    image: deid-pilot-backend:0.1.0
    environment:
      MAX_UPLOAD_BYTES: ${MAX_UPLOAD_BYTES:-10485760}
      ALLOWED_EXTENSIONS: ${ALLOWED_EXTENSIONS:-pdf,docx,png,jpg,jpeg}
      UPLOAD_STORAGE_DIR: ${UPLOAD_STORAGE_DIR:-/data/uploads}
      DOCUMENT_DATA_DIR: ${DOCUMENT_DATA_DIR:-/data/document-data}
      # Dev-only PII review-feedback archive (ENABLE_DEV_ENGINE_SETTINGS gated). Deliberately a
      # third, separate root from DOCUMENT_DATA_DIR: unlike document data, this survives a
      # document's deletion by design, so it can later feed PII-quality improvement.
      PII_FEEDBACK_ARCHIVE_DIR: ${PII_FEEDBACK_ARCHIVE_DIR:-/data/pii-feedback-archive}
      # Container-internal model root. Ignored unless INSTALL_OCR=true and the read-only
      # ./volumes/ocr-models mount below is populated (see scripts/fetch-ocr-models.sh). If the
      # models are missing the OCR station correctly returns 503; it never downloads at runtime.
      OCR_MODEL_DIR: ${OCR_MODEL_DIR:-/models/ocr}
      OCR_DETECTION_MODEL_NAME: ${OCR_DETECTION_MODEL_NAME:-PP-OCRv5_mobile_det}
      OCR_RECOGNITION_MODEL_NAME: ${OCR_RECOGNITION_MODEL_NAME:-latin_PP-OCRv5_mobile_rec}
      PII_LANGUAGE: ${PII_LANGUAGE:-de}
      PII_SPACY_MODEL: ${PII_SPACY_MODEL:-de_core_news_sm}
      PII_SCORE_THRESHOLD: ${PII_SCORE_THRESHOLD:-0.5}
      PII_PROFILE: ${PII_PROFILE:-structured-only}
      PII_ENTITY_TYPES: ${PII_ENTITY_TYPES:-}
      PII_CANDIDATE_VALIDATION_ENABLED: ${PII_CANDIDATE_VALIDATION_ENABLED:-true}
      ENABLE_DEV_ENGINE_SETTINGS: ${ENABLE_DEV_ENGINE_SETTINGS:-false}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - ./volumes/uploads:${UPLOAD_STORAGE_DIR:-/data/uploads}
      - ./volumes/document-data:${DOCUMENT_DATA_DIR:-/data/document-data}
      - ./volumes/pii-feedback-archive:${PII_FEEDBACK_ARCHIVE_DIR:-/data/pii-feedback-archive}
      # OCR models, read-only. Safe to mount even in slim mode: an empty/absent directory just
      # keeps the OCR station at 503. Never commit the contents (see .gitignore).
      - ./volumes/ocr-models:/models/ocr:ro
    networks:
      - internal
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/api/health/live').status==200 else 1)
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          # Slim default is intentionally small. The OCR/PII runtimes (PaddlePaddle/spaCy) need much
          # more headroom: running the OCR-enabled image under this 512M default OOM-kills the
          # backend while PaddleOCR loads/runs, which nginx then surfaces as a 502 Bad Gateway.
          # `make up-ocr`/`make up-full` raise BACKEND_MEMORY_LIMIT to 2g; when running
          # `docker compose` directly with INSTALL_OCR=true, set BACKEND_MEMORY_LIMIT=2g yourself.
          cpus: "${BACKEND_CPU_LIMIT:-1.0}"
          memory: ${BACKEND_MEMORY_LIMIT:-512M}
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    image: deid-pilot-frontend:0.1.0
    ports:
      - "${WEB_PORT:-8080}:8080"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - internal
    read_only: true
    tmpfs:
      # nginx (unprivileged) needs writable temp/pid/cache paths; everything else stays
      # read-only.
      - /tmp
      - /run
      - /var/cache/nginx
    security_opt:
      - no-new-privileges:true
    healthcheck:
      # Use 127.0.0.1 (not localhost): BusyBox wget resolves localhost to IPv6 ::1, but
      # nginx listens on IPv4 only.
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8080/healthz"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
    restart: unless-stopped

networks:
  internal:
    driver: bridge
