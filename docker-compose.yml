name: deid-pilot

services:
  backend:
    build:
      context: ./backend
    image: deid-pilot-backend:0.1.0
    environment:
      MAX_UPLOAD_BYTES: ${MAX_UPLOAD_BYTES:-10485760}
      ALLOWED_EXTENSIONS: ${ALLOWED_EXTENSIONS:-pdf,docx,png,jpg,jpeg}
      UPLOAD_DIR: /data/uploads
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - ./volumes/uploads:/data/uploads
    networks:
      - internal
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/api/health/live').status==200 else 1)
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    image: deid-pilot-frontend:0.1.0
    ports:
      - "${WEB_PORT:-8080}:8080"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - internal
    read_only: true
    tmpfs:
      # nginx (unprivileged) needs writable temp/pid/cache paths; everything else stays
      # read-only.
      - /tmp
      - /run
      - /var/cache/nginx
    security_opt:
      - no-new-privileges:true
    healthcheck:
      # Use 127.0.0.1 (not localhost): BusyBox wget resolves localhost to IPv6 ::1, but
      # nginx listens on IPv4 only.
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8080/healthz"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
    restart: unless-stopped

networks:
  internal:
    driver: bridge
