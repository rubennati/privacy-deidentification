name: ${COMPOSE_PROJECT_NAME:-privacy-deidentification}

# Shared application runtime configuration. The API and OCR worker intentionally use the same
# image in Phase 3.6; they share storage and job state, and differ only by command and resource
# limits. A slimmer API image can be split later when the dependency trees actually diverge.
x-app-environment: &app-environment
  MAX_UPLOAD_BYTES: ${MAX_UPLOAD_BYTES:-10485760}
  ALLOWED_EXTENSIONS: ${ALLOWED_EXTENSIONS:-pdf,docx,png,jpg,jpeg}
  # Container-internal storage paths. Deployments configure the host location via DATA_ROOT below;
  # these stable internal defaults keep API and worker on the same paths and are advanced overrides
  # only (not part of .env.example). JOB_STORE_DB_PATH is derived from DATA_JOB_STATE_DIR by default.
  UPLOAD_STORAGE_DIR: ${UPLOAD_STORAGE_DIR:-/data/uploads}
  DOCUMENT_DATA_DIR: ${DOCUMENT_DATA_DIR:-/data/document-store}
  DATA_JOB_STATE_DIR: ${DATA_JOB_STATE_DIR:-/data/job-state}
  JOB_STORE_DB_PATH: ${JOB_STORE_DB_PATH:-}
  OCR_EXECUTION_MODE: ${OCR_EXECUTION_MODE:-worker}
  OCR_WORKER_POLL_INTERVAL_SECONDS: ${OCR_WORKER_POLL_INTERVAL_SECONDS:-2.0}
  OCR_WORKER_CONCURRENCY: ${OCR_WORKER_CONCURRENCY:-1}
  OCR_WORKER_MAX_ATTEMPTS: ${OCR_WORKER_MAX_ATTEMPTS:-1}
  PII_FEEDBACK_ARCHIVE_DIR: ${PII_FEEDBACK_ARCHIVE_DIR:-/data/pii-feedback-archive}
  OCR_MODEL_DIR: ${OCR_MODEL_DIR:-/models/ocr}
  OCR_DETECTION_MODEL_NAME: ${OCR_DETECTION_MODEL_NAME:-PP-OCRv5_mobile_det}
  OCR_RECOGNITION_MODEL_NAME: ${OCR_RECOGNITION_MODEL_NAME:-latin_PP-OCRv5_mobile_rec}
  PII_LANGUAGE: ${PII_LANGUAGE:-de}
  PII_SPACY_MODEL: ${PII_SPACY_MODEL:-de_core_news_sm}
  PII_SCORE_THRESHOLD: ${PII_SCORE_THRESHOLD:-0.5}
  PII_PROFILE: ${PII_PROFILE:-review-heavy}
  PII_ENTITY_TYPES: ${PII_ENTITY_TYPES:-}
  PII_CANDIDATE_VALIDATION_ENABLED: ${PII_CANDIDATE_VALIDATION_ENABLED:-true}
  # Structural-context validation: a second subtractive stage that clips/rejects boundary/structural
  # false positives using the OCR contract's structured_content spans. Additive/reversible, no-TP-loss
  # invariant. See ADR-0043.
  PII_STRUCTURAL_VALIDATION_ENABLED: ${PII_STRUCTURAL_VALIDATION_ENABLED:-false}
  # NER backend for PERSON/ORGANIZATION. `gliner` sources them from a local GLiNER model mounted
  # read-only below (provision it first with scripts/fetch-ner-models.sh); `spacy` keeps the small
  # CNN NER. Other types are unaffected. See ADR-0042.
  PII_NER_BACKEND: ${PII_NER_BACKEND:-spacy}
  GLINER_MODEL_DIR: ${GLINER_MODEL_DIR:-/models/ner}
  GLINER_MODEL_NAME: ${GLINER_MODEL_NAME:-gliner_multi-v2.1}
  # Force HuggingFace/transformers fully offline. The GLiNER head and its mdeberta-v3-base backbone
  # are provisioned locally (scripts/fetch-ner-models.sh) and mounted read-only above; the backend
  # network is `internal: true` (no egress). These flags guarantee no model lookup is ever attempted
  # at runtime — a missing model fails fast and locally instead of reaching out. See ADR-0042.
  HF_HUB_OFFLINE: ${HF_HUB_OFFLINE:-1}
  TRANSFORMERS_OFFLINE: ${TRANSFORMERS_OFFLINE:-1}
  ENABLE_DEV_ENGINE_SETTINGS: ${ENABLE_DEV_ENGINE_SETTINGS:-false}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  TZ: ${TZ:-Europe/Vienna}

# Host storage. Deployments set a single DATA_ROOT; Compose maps its subdirectories onto the stable
# internal container paths above. The API and OCR worker share these exact mounts (YAML anchor), so
# job state and artifacts can never split between the two services.
x-app-volumes: &app-volumes
  - ${DATA_ROOT:-./volumes}/uploads:${UPLOAD_STORAGE_DIR:-/data/uploads}
  - ${DATA_ROOT:-./volumes}/document-store:${DOCUMENT_DATA_DIR:-/data/document-store}
  - ${DATA_ROOT:-./volumes}/job-state:${DATA_JOB_STATE_DIR:-/data/job-state}
  - ${DATA_ROOT:-./volumes}/pii-feedback-archive:${PII_FEEDBACK_ARCHIVE_DIR:-/data/pii-feedback-archive}
  - ${DATA_ROOT:-./volumes}/ocr-models:${OCR_MODEL_DIR:-/models/ocr}:ro
  - ${DATA_ROOT:-./volumes}/ner-models:${GLINER_MODEL_DIR:-/models/ner}:ro

services:
  api:
    # --- Identity ---
    build:
      context: ./backend
    image: privacy-deidentification-api:0.1.0
    restart: unless-stopped

    # --- Security ---
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true

    # --- Configuration ---
    environment: *app-environment

    # --- Storage ---
    volumes: *app-volumes

    # --- Networking ---
    networks:
      - private

    # --- Health ---
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/api/health/live').status==200 else 1)
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "${API_CPU_LIMIT:-1.0}"
          memory: ${API_MEMORY_LIMIT:-1g}

  ocr-worker:
    # --- Identity ---
    # Reuses the API image built above; the worker differs only by command and limits.
    image: privacy-deidentification-api:0.1.0
    command: ["python", "-m", "app.ocr_worker"]
    restart: unless-stopped

    # --- Security ---
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true

    # --- Configuration ---
    environment: *app-environment

    # --- Storage ---
    volumes: *app-volumes

    # --- Networking ---
    networks:
      - private

    # --- Health ---
    deploy:
      resources:
        limits:
          cpus: "${OCR_WORKER_CPU_LIMIT:-1.0}"
          memory: ${OCR_WORKER_MEMORY_LIMIT:-2g}

  frontend:
    # --- Identity ---
    build:
      context: ./frontend
    image: privacy-deidentification-frontend:0.1.0
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
      ocr-worker:
        condition: service_started

    # --- Security ---
    read_only: true
    tmpfs:
      - /tmp
      - /run
      - /var/cache/nginx
    security_opt:
      - no-new-privileges:true

    # --- Configuration ---

    # --- Storage ---

    # --- Networking ---
    # Bind to localhost by default (no LAN exposure). Set WEB_BIND=0.0.0.0 to reach it from other
    # machines on the LAN (e.g. a demo). The frontend is the only service on the ingress network.
    ports:
      - "${WEB_BIND:-127.0.0.1}:${WEB_PORT:-8080}:8080"
    networks:
      - private
      - ingress

    # --- Health ---
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8080/healthz"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: "${FRONTEND_CPU_LIMIT:-0.5}"
          memory: ${FRONTEND_MEMORY_LIMIT:-128M}

networks:
  # Backend network for api + ocr-worker (+ frontend, to reach the api). `internal: true` gives it
  # no gateway, so these containers — which do ALL document/PII processing (OCR, PII, GLiNER) —
  # provably cannot reach the internet. Container-to-container DNS still works. Verified: api egress
  # is blocked while the app stays reachable.
  private:
    name: ${COMPOSE_PROJECT_NAME:-privacy-deidentification}-private
    driver: bridge
    internal: true
  # Ingress-only network carrying the published web port. Only the frontend (static SPA + reverse
  # proxy, never touches documents/PII) is attached here; a published port needs a non-internal net.
  ingress:
    name: ${COMPOSE_PROJECT_NAME:-privacy-deidentification}-ingress
    driver: bridge
