server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Safety cap only. The backend (MAX_UPLOAD_BYTES) enforces the real per-file limit and
    # returns a clean JSON 413 for files up to this cap; nginx only rejects absurdly large
    # bodies — and does so as JSON too (see error_page below), never as an HTML page.
    client_max_body_size 25m;
    error_page 413 = @too_large;

    # Security headers are owned here (the edge) for every response, including proxied API
    # responses. The backend does not set them, to avoid duplicate headers.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'" always;

    location @too_large {
        default_type application/json;
        add_header X-Content-Type-Options "nosniff" always;
        return 413 '{"detail":"File exceeds the maximum upload size.","correlation_id":null}';
    }

    # Lightweight health endpoint for container healthchecks.
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # Proxy API calls to the backend (same origin for the browser).
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        proxy_request_buffering off;
        # OCR/Text runs synchronously (by design: no queue). CPU OCR of a multi-page scan can
        # take minutes, so allow long-running requests instead of nginx's default 60s 504.
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # SPA fallback: serve index.html for client-side routes.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
